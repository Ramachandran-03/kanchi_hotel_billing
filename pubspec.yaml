name: kpm_hotel_bill
description: "KPM Hotel Bill - Restaurant Billing & Management App"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  provider: ^6.1.2
  # SQLite database
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  # Date/time & currency formatting
  intl: ^0.20.2
  # PDF generation & printing
  pdf: ^3.11.4
  printing: ^5.13.5
  # Share files
  share_plus: ^10.1.4
  # Unique IDs
  uuid: ^4.5.1
  # Image picker for logo upload
  image_picker: ^1.2.1
  # Local preferences (language, printer)
  shared_preferences: ^2.3.5
  # Bluetooth thermal printer
  print_bluetooth_thermal: ^1.1.1
  # Runtime permissions
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app_logo.png
    - assets/images/company_logo.png
